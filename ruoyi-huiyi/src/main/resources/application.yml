# AI服务配置
huiyi:
  storage:
    audio-path: /home/shao/project/conference-management-java/audio
    transcript-path: /home/shao/project/conference-management-java/transcript

  upload:
    max-size: 1024MB
    allowed-type: mp3,wav

  asr:
    api-url: http://192.168.2.195:8000/v1/audio/transcriptions
    connect-timeout: 5000
    socket-timeout: 60000

  llm:
    api-url: http://192.168.2.195:8081/v1/chat/completions
    model: gemma4
    connect-timeout: 5000
    socket-timeout: 60000

  rabbitmq:
    asr:
          exchange: huiyi.asr.exchange
          queue: huiyi.asr.queue
          routing-key: huiyi.asr.routing.key
          concurrency: 2        # 同时处理几个音频文件，对应你ASR服务能扛住的并发数
          max-concurrency: 4
    minutes:
          exchange: huiyi.minutes.exchange
          queue: huiyi.minutes.queue
          routing-key: huiyi.minutes.routing.key
          concurrency: 2
          max-concurrency: 4
spring:
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: shaoqi
    password: Shaoqi2006
    listener:
      simple:
        acknowledge-mode: manual   # 手动ack，处理失败不丢消息
        retry:
          enabled: true
          max-attempts: 3
